{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verified · MediCare</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #f5f3ef;
      --surface:     #ffffff;
      --sidebar-bg:  #1a1a2e;
      --accent:      #c8a97e;
      --text:        #1c1c1c;
      --muted:       #7a7a7a;
      --border:      #e5e2da;
      --success:     #6abf8a;
      --radius:      14px;
      --shadow:      0 4px 24px rgba(0,0,0,.07);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-size: 15px;
      line-height: 1.55;
    }
    .container {
      width: 100%;
      max-width: 420px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      box-shadow: var(--shadow);
      animation: slideIn .4s ease both;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }
    .icon-box {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--sidebar-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }
    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      font-weight: 400;
    }
    .brand-sub {
      font-size: .7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      margin-bottom: .3rem;
      font-weight: 400;
    }
    .subtitle {
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .success-box {
      background: #e8f5ec;
      border: 1px solid #b8dfc5;
      border-radius: 8px;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .success-icon {
      font-size: 2rem;
      margin-bottom: .5rem;
    }
    .success-text {
      color: #2e7d4f;
      font-weight: 500;
      font-size: .95rem;
    }
    .btn {
      width: 100%;
      padding: 12px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      transition: all .2s;
    }
    .btn:hover {
      background: #b8975f;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(200, 169, 126, .2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="icon-box">⚕️</div>
        <div class="brand-text">
          <div class="brand-name">MediCare</div>
          <div class="brand-sub">Clinic System</div>
        </div>
      </div>

      <h1 class="title">Verified</h1>
      <p class="subtitle">You're all set</p>

      <div class="success-box">
        <div class="success-text">Your account has been verified successfully</div>
      </div>

      <a href="{% url 'login' %}" class="btn">Continue to Login</a>
    </div>
  </div>
</body>
</html>
