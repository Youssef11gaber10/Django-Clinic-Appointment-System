{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset Complete · MediCare</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f3ef; --surface: #ffffff; --sidebar-bg: #1a1a2e;
      --accent: #c8a97e; --accent2: #6a9fb5; --text: #1c1c1c;
      --muted: #7a7a7a; --border: #e5e2da;
      --radius: 14px; --shadow: 0 4px 24px rgba(0,0,0,.07);
    }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem; font-size: 15px; line-height: 1.55;
    }
    .auth-container { width: 100%; max-width: 420px; }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2.5rem; box-shadow: var(--shadow);
      animation: fadeUp .42s ease both; text-align: center;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .success-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: #e8f5ec; border: 2px solid #b8dfc5;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 1.5rem;
    }
    .auth-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 2rem; text-decoration: none; color: var(--text);
      justify-content: center;
    }
    .auth-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--sidebar-bg); display: flex; align-items: center;
      justify-content: center; color: var(--accent); font-size: 1.3rem;
    }
    .auth-brand { display: flex; flex-direction: column; gap: 2px; text-align: left; }
    .auth-brand-name { font-family: 'DM Serif Display', serif; font-size: 1.3rem; font-weight: 400; }
    .auth-brand-sub { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .auth-title { font-family: 'DM Serif Display', serif; font-size: 1.8rem; margin-bottom: .5rem; font-weight: 400; }
    .auth-subtitle { font-size: .88rem; color: var(--muted); margin-bottom: 2rem; }
    .btn-primary {
      display: inline-block; padding: 10px 28px;
      background: var(--sidebar-bg); color: #fff; border-radius: 8px;
      text-decoration: none; font-size: .88rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: .06em; transition: all .15s;
    }
    .btn-primary:hover { background: #2e2e4a; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <a href="{% url 'login' %}" class="auth-header">
        <div class="auth-icon">⚕️</div>
        <div class="auth-brand">
          <div class="auth-brand-name">MediCare</div>
          <div class="auth-brand-sub">Clinic System</div>
        </div>
      </a>

      <div class="success-icon">✓</div>
      <h1 class="auth-title">Password Reset!</h1>
      <p class="auth-subtitle">Your password has been set. You can now log in with your new password.</p>

      <a href="{% url 'login' %}" class="btn-primary">Log In</a>
    </div>
  </div>
</body>
</html>
